[build-system]
requires = ["setuptools>=61", "wheel", "pybind11"]
build-backend = "setuptools.build_meta"

[project]
name = "threedimensions"
version = "1.0.0"
description = "Professional Hybrid 3D Modeling Engine (C++ Core + Python API)"
authors = [{name = "LegedsDaD"}]
requires-python = ">=3.11"
readme = "README.md"
license = "MIT"

[tool.setuptools]
package-dir = {"" = "python"}

[tool.setuptools.packages.find]
where = ["python"]


