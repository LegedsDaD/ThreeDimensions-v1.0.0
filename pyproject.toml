[build-system]
requires = [
  "scikit-build-core>=0.9",
  "pybind11>=2.12"
]
build-backend = "scikit_build_core.build"

[project]
name = "threedimensions"
version = "1.0.0"
description = "Professional Hybrid 3D Modeling Engine (C++ Core + Python API)"
authors = [{ name = "LegedsDaD" }]
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }

[tool.scikit-build]
wheel.packages = ["python/threedimensions"]
build-dir = "build/{wheel_tag}"
